<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso Oficial | BotBrain</title>

    <script>
    function continuar() {
        const btn = document.getElementById("btn");
        const loading = document.getElementById("loading");

        btn.innerHTML = "Abrindo Telegram...";
        btn.disabled = true;
        loading.style.display = "block";

        setTimeout(() => {
            // 1. Captura os parâmetros (UTMs) que vieram do anúncio do TikTok
            const params = window.location.search; 
            
            // 2. Link direto do seu Bot com o ID da BotBrain
            // O parâmetro 'start' é o que o bot lê para saber quem é o usuário/campanha
            const baseUrl = "https://t.me/Larissa_Fuego_bot";
            
            // 3. Concatena o link do bot com as UTMs (trocando o '?' por '&' se necessário)
            const finalUrl = params ? baseUrl + "&" + params.substring(1) : baseUrl;
            
            window.location.href = finalUrl;
        }, 800);
    }
    </script>

    <style>
        body {
            background: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }

        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            margin-top: 20px;
        }

        .product-image {
            width: 150px; 
            height: 150px;
            object-fit: cover; 
            border-radius: 50%; 
            margin: 0 auto 20px;
            border: 3px solid #ec407a;
            display: block;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
        }

        .desc {
            font-size: 15px;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .info-box {
            background: rgba(236, 64, 122, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #ec407a;
            margin-bottom: 20px;
            border: 1px solid rgba(236, 64, 122, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #ec407a, #d81b60);
            color: white;
            font-size: 17px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        #loading {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #ec407a;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }

        .footer a { color: #666; margin: 0 5px; }
    </style>
</head>

<body>

<div class="container">
    <img src="foto_anuncio.jpg" alt="Acesso" class="product-image">
    
    <div class="title">Acesso Liberado</div>
    
    <div class="desc">
        Clique no botão abaixo para abrir o sistema diretamente no seu <strong>Telegram</strong>.
    </div>

    <div class="info-box">
        🔒 Verificado pela BotBrain.
    </div>

    <button id="btn" onclick="continuar()">
        ABRIR TELEGRAM AGORA
    </button>

    <div id="loading">
        Conectando ao bot seguro...
    </div>
</div>

<div class="footer">
    <p>© 2026 BotBrain - Todos os direitos reservados.</p>
    <a href="#">Privacidade</a> • <a href="#">Termos</a>
</div>

</body>
</html>
