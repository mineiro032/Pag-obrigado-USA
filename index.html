<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificação</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f8fafc;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.card{
  width:100%;
  max-width:360px;
  background:#fff;
  border-radius:20px;
  padding:30px 24px;
  box-shadow:0 5px 20px rgba(0,0,0,.06);
  border:1px solid #e5e7eb;
  text-align:center;
}

.icon{
  width:60px;
  height:60px;
  background:#eff6ff;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}

.icon svg{
  width:28px;
  height:28px;
  fill:#2563eb;
}

h1{
  font-size:24px;
  color:#111827;
  margin-bottom:10px;
}

p{
  color:#6b7280;
  font-size:14px;
  line-height:1.5;
}

.box{
  margin-top:20px;
  padding:14px;
  border-radius:14px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
  font-size:13px;
  color:#374151;
}

.btn{
  width:100%;
  margin-top:24px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#111827;
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  opacity:.95;
}

.footer{
  margin-top:16px;
  font-size:11px;
  color:#9ca3af;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L3 7v6c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11V7l-9-5z"/>
    </svg>
  </div>

  <h1>Acesso disponível</h1>

  <p>
    Sua verificação foi concluída com sucesso.
  </p>

  <div class="box">
    Ambiente seguro carregado corretamente.
  </div>

  <button class="btn" id="continueBtn">
    Continuar
  </button>

  <div class="footer">
    conexão protegida
  </div>

</div>

<script>
document.getElementById("continueBtn").addEventListener("click", async function(){

  const btn = this;

  btn.innerHTML = "Carregando...";
  btn.disabled = true;

  try{

    const params = {};
    
    new URLSearchParams(window.location.search)
    .forEach((v,k)=>{
      params[k] = v;
    });

    const response = await fetch(
      "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          shortCode:"bot-0f2a7811",
          queryParams:params,
          userAgent:navigator.userAgent
        })
      }
    );

    const data = await response.json();

    if(data.redirectUrl){
      window.location.href = data.redirectUrl;
    }

  }catch(e){

    btn.innerHTML = "Continuar";
    btn.disabled = false;

  }

});
</script>

</body>
</html>
