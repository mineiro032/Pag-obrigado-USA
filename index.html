<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acesso</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: "Inter", Arial, sans-serif;
  background:#f4f7fb;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}

/* ELEMENTOS DECORATIVOS */
.bg-circle{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.5;
}

.circle1{
  width:220px;
  height:220px;
  background:#c7d2fe;
  top:-60px;
  left:-60px;
}

.circle2{
  width:250px;
  height:250px;
  background:#bfdbfe;
  bottom:-80px;
  right:-80px;
}

.card{
  width:100%;
  max-width:380px;
  background:#ffffff;
  border-radius:28px;
  padding:32px 26px;
  position:relative;
  z-index:2;
  box-shadow:
    0 10px 30px rgba(15,23,42,.08),
    0 2px 8px rgba(15,23,42,.04);
  border:1px solid rgba(226,232,240,.7);
}

.top-badge{
  width:52px;
  height:52px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  box-shadow:0 10px 20px rgba(37,99,235,.18);
}

.top-badge svg{
  width:24px;
  height:24px;
  fill:#fff;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:700;
  color:#0f172a;
  margin-bottom:10px;
  line-height:1.3;
}

.desc{
  text-align:center;
  font-size:14px;
  line-height:1.6;
  color:#64748b;
  margin-bottom:26px;
}

.info{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:16px;
  padding:14px;
  margin-bottom:24px;
}

.info-item{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#475569;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  flex-shrink:0;
}

.btn{
  width:100%;
  border:none;
  border-radius:16px;
  background:#0f172a;
  color:#fff;
  padding:16px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.2s ease;
  letter-spacing:.2px;
}

.btn:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.btn:active{
  transform:scale(.98);
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:11px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="card">

  <div class="top-badge">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L3 7v6c0 5 3.8 9.7 9 11 5.2-1.3 9-6 9-11V7l-9-5z"/>
    </svg>
  </div>

  <div class="title">
    Área liberada
  </div>

  <div class="desc">
    O conteúdo solicitado já está disponível para visualização.
  </div>

  <div class="info">
    <div class="info-item">
      <div class="dot"></div>
      Verificação concluída com sucesso
    </div>
  </div>

  <button class="btn">
    Continuar
  </button>

  <div class="footer">
    carregando acesso seguro...
  </div>

</div>
