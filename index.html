    <script>
    function continuar() {
        const btn = document.getElementById("btn");
        const loading = document.getElementById("loading");

        btn.innerHTML = "Preparando acesso...";
        btn.disabled = true;
        loading.style.display = "block";

        setTimeout(() => {
            const params = window.location.search;
            // ATENÇÃO: Recomendo trocar este encurtador pelo link direto do t.me/seu_bot
            // Exemplo: const baseUrl = "https://t.me/SEU_BOT?start=botbrain";
            const baseUrl = "https://encurtar-link.click/l/bot-d6112058";
            window.location.href = baseUrl + params.replace('?', '&');
        }, 800);
    }
    </script>
