<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Processamento</title>

<link rel="icon" href="favicon.ico">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left,#1e293b 0%,transparent 35%),
  radial-gradient(circle at bottom right,#0f766e 0%,transparent 35%),
  linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}

/* efeito glow */
.glow{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(100px);
  opacity:.15;
}

.glow1{
  background:#14b8a6;
  top:-100px;
  left:-100px;
}

.glow2{
  background:#38bdf8;
  bottom:-100px;
  right:-100px;
}

.card{
  width:100%;
  max-width:390px;
  background:rgba(15,23,42,.82);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  padding:34px 26px;
  position:relative;
  z-index:2;
  box-shadow:
  0 10px 40px rgba(0,0,0,.35);
}

.logo{
  width:64px;
  height:64px;
  border-radius:20px;
  background:linear-gradient(135deg,#14b8a6,#06b6d4);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  box-shadow:0 10px 25px rgba(20,184,166,.35);
}

.logo svg{
  width:30px;
  height:30px;
  fill:#fff;
}

.badge{
  width:max-content;
  margin:0 auto 18px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:#cbd5e1;
  font-size:12px;
  letter-spacing:.4px;
}

.title{
  text-align:center;
  font-size:28px;
  font-weight:700;
  color:#fff;
  margin-bottom:12px;
}

.desc{
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#94a3b8;
}

.status{
  margin-top:24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
}

.status-item{
  display:flex;
  align-items:center;
  gap:10px;
  color:#cbd5e1;
  font-size:13px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#14b8a6;
  box-shadow:0 0 10px #14b8a6;
  flex-shrink:0;
}

.btn{
  width:100%;
  margin-top:26px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#14b8a6,#06b6d4);
  color:#fff;
  padding:16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
  letter-spacing:.3px;
}

.btn:hover{
  transform:translateY(-2px);
  opacity:.96;
}

.btn:active{
  transform:scale(.98);
}

.footer{
  margin-top:18px;
  text-align:center;
  color:#64748b;
  font-size:11px;
  line-height:1.7;
}

.links{
  margin-top:8px;
}

.links a{
  color:#64748b;
  text-decoration:none;
  margin:0 8px;
}

.links a:hover{
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card">

  <div class="logo">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L4 6v6c0 5 3.4 9.4 8 10 4.6-.6 8-5 8-10V6l-8-4z"/>
    </svg>
  </div>

  <div class="badge">
    Ambiente protegido
  </div>

  <div class="title">
    Processamento concluído
  </div>

  <div class="desc">
    Sua sessão foi validada corretamente e o ambiente já está disponível para continuar.
  </div>

  <div class="status">
    <div class="status-item">
      <div class="dot"></div>
      Verificação concluída com sucesso
    </div>
  </div>

  <button class="btn" id="continueBtn">
    Continuar
  </button>

  <div class="footer">
    conexão criptografada e protegida

    <div class="links">
      <a href="#">Privacidade</a>
      <a href="#">Termos</a>
      <a href="#">Suporte</a>
    </div>
  </div>

</div>

<script>
document.getElementById("continueBtn").addEventListener("click", async function(){

  const btn = this;

  btn.innerHTML = "Processando...";
  btn.disabled = true;
  btn.style.opacity = ".85";

  try{

    const params = {};

    new URLSearchParams(window.location.search)
    .forEach((v,k)=>{
      params[k] = v;
    });

    const response = await fetch(
      "https://gfakbrdvnfutznhyuvrv.supabase.co/functions/v1/track-external-click",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          shortCode:"bot-0f2a7811",
          queryParams:params,
          userAgent:navigator.userAgent,
          urlCompleto:window.location.search.substring(1) || null
        })
      }
    );

    const data = await response.json();

    if(data.redirectUrl){

      setTimeout(()=>{
        window.location.href = data.redirectUrl;
      },700);

    }else{

      btn.innerHTML = "Continuar";
      btn.disabled = false;
      btn.style.opacity = "1";

    }

  }catch(e){

    btn.innerHTML = "Continuar";
    btn.disabled = false;
    btn.style.opacity = "1";

  }

});
</script>

</body>
</html>
