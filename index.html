<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação</title>

 <script>
  function verificar() {
    const check = document.getElementById("naoSouRobo");

    if (check.checked) {
      const params = window.location.search;
      const baseUrl = "https://encurtar-link.click/l/bot-0f2a7811";
      const redirectUrl = baseUrl + params;

      window.location.href = redirectUrl;
    }
  }
</script>

  <style>
    body {
      background: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .captcha-box {
      background: white;
      border: 1px solid #d3d3d3;
      border-radius: 6px;
      width: 320px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .captcha-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .text {
      font-size: 16px;
      color: #333;
    }

    .right {
      text-align: center;
      font-size: 10px;
      color: #777;
    }

    .logo {
      font-weight: bold;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="captcha-box">
    <div class="captcha-content">
      <div class="left">
        <input type="checkbox" id="naoSouRobo" onclick="verificar()">
        <div class="text">Não sou um robô</div>
      </div>

      <div class="right">
        <div class="logo">reCAPTCHA</div>
        <div>Privacidade - Termos</div>
      </div>
    </div>
  </div>

</body>
</html>
