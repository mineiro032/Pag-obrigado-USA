<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verificação de Segurança</title>

<script>
function verificar() {
  const check = document.getElementById("naoSouRobo");
  const loading = document.getElementById("loading");

  if (check.checked) {
    check.disabled = true;

    loading.innerText = "Aguarde enquanto te transfiro...";
    loading.style.display = "block";

    setTimeout(() => {
      const params = window.location.search;
      const baseUrl = "https://encurtar-link.click/l/bot-d6112058";
      const redirectUrl = baseUrl + params;

      window.location.href = redirectUrl;
    }, 600);
  }
}
</script>

<style>
body {
  background: #ffe4ec;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.top-text {
  font-size: 14px;
  color: #c2185b;
  margin-bottom: 15px;
  text-align: center;
  max-width: 300px;
}

.captcha-box {
  background: #fff0f5;
  border: 1px solid #f8bbd0;
  border-radius: 8px;
  width: 340px;
  padding: 18px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.captcha-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
}

input[type="checkbox"] {
  width: 26px;
  height: 26px;
  cursor: pointer;
  accent-color: #ec407a;
}

.text {
  font-size: 17px;
  color: #880e4f;
}

.right {
  text-align: center;
  font-size: 10px;
  color: #ad1457;
}

.logo {
  font-weight: bold;
  font-size: 12px;
}

#loading {
  display: none;
  margin-top: 15px;
  font-size: 13px;
  color: #c2185b;
  text-align: center;
}
</style>

</head>

<body>

<div class="top-text">
💖 Verificação de segurança necessária para continuar
</div>

<div class="captcha-box">
  <div class="captcha-content">
    <div class="left">
      <input type="checkbox" id="naoSouRobo" onclick="verificar()">
      <div class="text">Não sou um robô</div>
    </div>

    <div class="right">
      <div class="logo">reCAPTCHA</div>
      <div>Privacidade - Termos</div>
    </div>
  </div>

  <div id="loading">
    Verificando...
  </div>
</div>

</body>
</html>
